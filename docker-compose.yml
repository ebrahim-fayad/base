services:
  mysql:
    image: mysql:8.0
    container_name: wezna_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wezna
      MYSQL_USER: wezna
      MYSQL_PASSWORD: root
    ports:
      - "33061:3306"
    volumes:
      - wezna_mysql_data:/var/lib/mysql

volumes:
  wezna_mysql_data:
